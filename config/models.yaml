# Model roster for llm-codebench.
#
# Each entry is an OpenRouter model id. Pricing is normally fetched live from
# OpenRouter's /api/v1/models endpoint (separate per-token USD rates for input
# and output). Set `price_override` only if you need to pin a price for
# costing/dry-run: it is a FLAT USD-per-token rate applied to BOTH prompt and
# completion tokens (a single blended figure, since one number can't express the
# input/output split). When set, the Attempt's price_source is recorded as
# "config" instead of "api".
#
# Format:
#   models:
#     - id: <openrouter/model-id>
#       price_override: <float | null>   # optional; flat USD/token, both sides
#       efforts: [low, medium, high]     # optional; reasoning-effort fan-out
#
# `efforts` sweeps one model across reasoning levels: the entry expands into one
# benchmark target per level, each a separate leaderboard row labelled
# "<id> (<effort>)". Effort is sent via OpenRouter's unified reasoning.effort
# param (mapped per-provider); models without a reasoning mode ignore it. Omit
# `efforts` for a single, effort-less run. A run-wide `--efforts low,high` flag
# overrides these per-entry lists for every selected model.
#
# Discover ids at https://openrouter.ai/models

models:
  # Current flagship model from each major provider (verified live on
  # OpenRouter). Pricing shown is input / output USD per 1M tokens at time of
  # writing; the harness fetches live pricing at run time regardless.

  # Anthropic — Claude Opus 4.8  ($5 / $25 per M)
  - id: anthropic/claude-opus-4.8
    price_override: null

  # Anthropic — Claude Fable 5
  - id: anthropic/claude-fable-5
    price_override: null

  # OpenAI — GPT-5.5  ($5 / $30 per M)
  - id: openai/gpt-5.5
    price_override: null

  # OpenAI — GPT-5.6
  - id: openai/gpt-5.6
    price_override: null

  # Google — Gemini 3.1 Pro  ($2 / $12 per M)
  - id: google/gemini-3.1-pro-preview
    price_override: null

  # xAI — Grok 4.5  ($2 / $6 per M)
  - id: x-ai/grok-4.5
    price_override: null
